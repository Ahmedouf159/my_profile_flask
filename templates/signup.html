{% extends "base.html" %}
{% set title = "Sign up" %}
{% block content %}

<section class="auth">
  <div class="container auth__grid">
    <div class="auth__left" data-reveal>
      <h1 class="auth__title">Create your account</h1>
      <p class="muted">After signup, login and you will see your letter avatar in the header.</p>
    </div>

    <div class="authCard" data-reveal>
      <form method="POST" class="form">
        <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">

        <label class="label">Username</label>
        <input class="input" name="username" placeholder="Ahmed" required>

        <label class="label">Email</label>
        <input class="input" name="email" type="email" placeholder="ahmed@email.com" required>

        <label class="label">Password</label>
        <div class="password-wrap">
          <input type="password" id="password" name="password" placeholder="Password" required>
          <button type="button" class="toggle-pass" data-target="password" aria-label="Show password">
            Show
          </button>
        </div>

        <label class="label">Confirm Password</label>
        <div class="password-wrap">
          <input type="password" id="confirm_password" name="confirm_password" placeholder="Confirm password" required>
          <button type="button" class="toggle-pass" data-target="confirm_password" aria-label="Show password">
            Show
          </button>
        </div>

        <button class="btn btn--primary w100" type="submit">Create account</button>

        {% include "_social_auth.html" %}

        <p class="muted small center">
          Already have an account? <a class="link" href="{{ url_for('auth.login') }}">Login</a>
        </p>
      </form>
    </div>
  </div>
</section>

{% endblock %}
