{% extends "base.html" %}
{% set title = case_study.title %}
{% block content %}
<section class="pageTop">
  <div class="container">
    <span class="hero-kicker">{{ case_study.stack }}</span>
    <h1 class="pageTitle">{{ case_study.title }}</h1>
    <p class="pageSub">{{ case_study.result }}</p>
  </div>
</section>
<section class="section">
  <div class="grid-3">
    <article class="card">
      <h2>Challenge</h2>
      <p class="muted">{{ case_study.challenge }}</p>
    </article>
    <article class="card">
      <h2>Solution</h2>
      <p class="muted">{{ case_study.solution }}</p>
    </article>
    <article class="card">
      <h2>Result</h2>
      <p class="muted">{{ case_study.result }}</p>
    </article>
  </div>
</section>
{% endblock %}
